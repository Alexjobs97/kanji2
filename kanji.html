<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kanji — KanjiBaby</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink:        #0f0e0d;
      --paper:      #f5f0e8;
      --paper2:     #ede7d9;
      --vermillion: #c0392b;
      --gold:       #b8860b;
      --muted:      #8a7f72;
      --border:     #2a2520;
      --card-bg:    #161310;
      --correct:    #27ae60;
      --l1: #c0392b; --l2: #b8860b; --l3: #27ae60; --l4: #2980b9;
      --font-jp:    'Shippori Mincho', serif;
      --font-mono:  'DM Mono', monospace;
      --font-sans:  'Noto Sans JP', sans-serif;
    }

    body {
      background: var(--ink);
      color: var(--paper);
      font-family: var(--font-sans);
      font-weight: 300;
      min-height: 100vh;
    }

    /* ── TOP NAV ── */
    .topnav {
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 1.2rem 2rem;
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0;
      background: var(--ink); z-index: 50;
    }
    .back-link {
      font-family: var(--font-mono); font-size: 0.7rem;
      color: var(--muted); text-decoration: none;
      letter-spacing: 0.1em; transition: color 0.2s;
    }
    .back-link:hover { color: var(--paper); }
    .nav-actions { display: flex; gap: 0.8rem; align-items: center; }
    .ext-link {
      font-family: var(--font-mono); font-size: 0.65rem;
      color: var(--muted); text-decoration: none;
      border: 1px solid var(--border);
      padding: 0.3rem 0.7rem; border-radius: 4px;
      transition: all 0.2s; letter-spacing: 0.05em;
      display: flex; align-items: center; gap: 0.3rem;
    }
    .ext-link:hover { color: var(--paper); border-color: var(--muted); }

    /* ── HERO ── */
    .hero {
      display: flex; align-items: stretch;
      border-bottom: 1px solid var(--border);
      min-height: 220px;
    }
    .hero-kanji-col {
      width: clamp(160px, 28vw, 260px);
      display: flex; align-items: center; justify-content: center;
      border-right: 1px solid var(--border);
      position: relative; overflow: hidden;
      background: #0d0b09;
      flex-shrink: 0;
    }
    .hero-kanji {
      font-family: var(--font-jp);
      font-size: clamp(6rem, 15vw, 10rem);
      font-weight: 800;
      color: var(--paper);
      line-height: 1;
      position: relative; z-index: 2;
    }
    .hero-kanji-shadow {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-jp);
      font-size: clamp(8rem, 20vw, 14rem);
      font-weight: 800;
      color: rgba(255,255,255,0.03);
      pointer-events: none;
      z-index: 1;
    }

    .hero-info {
      flex: 1; padding: 2rem 2.5rem;
      display: flex; flex-direction: column; justify-content: center; gap: 0.8rem;
    }
    .hero-keyword {
      font-family: var(--font-jp);
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 600;
      color: var(--paper);
      line-height: 1.1;
    }
    .hero-heisig-badge {
      display: inline-flex; align-items: center;
      font-family: var(--font-mono); font-size: 0.6rem;
      color: var(--vermillion);
      border: 1px solid rgba(192,57,43,0.35);
      padding: 0.2rem 0.55rem; border-radius: 3px;
      letter-spacing: 0.15em; width: fit-content;
    }
    .hero-level-bar {
      display: flex; align-items: center; gap: 1rem; margin-top: 0.3rem;
    }
    .level-pip-row { display: flex; gap: 4px; }
    .level-pip {
      width: 28px; height: 4px; border-radius: 2px;
      background: var(--border);
      transition: background 0.3s;
    }
    .level-pip.filled-1 { background: var(--l1); }
    .level-pip.filled-2 { background: var(--l2); }
    .level-pip.filled-3 { background: var(--l3); }
    .level-pip.filled-4 { background: var(--l4); }
    .level-label {
      font-family: var(--font-mono);
      font-size: 0.6rem; color: var(--muted);
      letter-spacing: 0.1em;
    }

    /* ── CONTENT GRID ── */
    .content {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
    }
    @media (max-width: 700px) { .content { grid-template-columns: 1fr; } }

    .info-block {
      padding: 1.8rem 2rem;
      border-bottom: 1px solid var(--border);
    }
    .info-block:nth-child(odd) { border-right: 1px solid var(--border); }
    @media (max-width: 700px) { .info-block:nth-child(odd) { border-right: none; } }

    .block-label {
      font-family: var(--font-mono);
      font-size: 0.55rem; color: var(--muted);
      letter-spacing: 0.25em; text-transform: uppercase;
      margin-bottom: 0.6rem;
    }
    .block-value {
      font-family: var(--font-jp);
      font-size: 1rem; color: var(--paper);
      line-height: 1.6;
    }
    .block-value.readings {
      font-size: 1.1rem; letter-spacing: 0.05em;
    }
    .block-value.meanings {
      font-size: 0.9rem; color: var(--paper2);
    }
    .reading-tag {
      display: inline-block;
      background: #1e1b17;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.15rem 0.55rem;
      margin: 0.15rem 0.2rem 0.15rem 0;
      font-size: 0.95rem;
    }

    /* ── WORDS ── */
    .words-block {
      grid-column: 1 / -1;
      padding: 1.8rem 2rem;
      border-bottom: 1px solid var(--border);
    }
    .words-grid {
      display: flex; flex-wrap: wrap; gap: 0.5rem;
      margin-top: 0.6rem;
    }
    .word-chip {
      font-family: var(--font-jp);
      font-size: 0.95rem;
      background: #1a1714;
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 0.35rem 0.75rem;
      color: var(--paper);
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
      display: inline-flex; align-items: center; gap: 0.3rem;
    }
    .word-chip:hover {
      background: #2a2520;
      border-color: var(--gold);
      color: var(--gold);
    }
    .word-chip-arrow { font-size: 0.6rem; color: var(--muted); }

    /* ── MNEMONICO ── */
    .mnemonic-block {
      grid-column: 1 / -1;
      padding: 1.8rem 2rem;
      border-bottom: 1px solid var(--border);
    }
    .mnemonic-header {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 0.8rem;
    }
    .mnemonic-toggle-btn {
      font-family: var(--font-mono); font-size: 0.6rem;
      color: var(--muted); background: none;
      border: 1px solid var(--border); border-radius: 4px;
      padding: 0.25rem 0.6rem; cursor: pointer;
      transition: all 0.2s;
    }
    .mnemonic-toggle-btn:hover { color: var(--paper); border-color: var(--muted); }
    .mnemonic-content { display: none; }
    .mnemonic-content.visible { display: block; }
    #mnemonicText {
      width: 100%; min-height: 70px;
      background: #1a1714; border: 1px solid var(--border);
      border-radius: 6px; color: var(--paper);
      font-family: var(--font-mono); font-size: 0.78rem;
      padding: 0.7rem 0.9rem; resize: vertical; outline: none;
      transition: border-color 0.2s; line-height: 1.5;
    }
    #mnemonicText:focus { border-color: var(--vermillion); }
    #mnemonicText::placeholder { color: var(--muted); font-style: italic; }
    .mnemonic-save-btn {
      margin-top: 0.5rem;
      font-family: var(--font-mono); font-size: 0.65rem;
      color: var(--muted); background: none;
      border: 1px solid var(--border); border-radius: 4px;
      padding: 0.3rem 0.8rem; cursor: pointer; transition: all 0.2s;
    }
    .mnemonic-save-btn:hover { color: var(--paper); border-color: var(--muted); }
    .mnemonic-save-btn.saved { color: var(--correct); border-color: var(--correct); }

    /* ── STATS BLOCK ── */
    .stats-block {
      grid-column: 1 / -1;
      padding: 1.8rem 2rem;
      display: flex; gap: 2.5rem; flex-wrap: wrap;
    }
    .stat-item { display: flex; flex-direction: column; gap: 0.2rem; }
    .stat-val {
      font-family: var(--font-jp); font-size: 1.6rem;
      font-weight: 600; line-height: 1;
    }
    .stat-lbl {
      font-family: var(--font-mono); font-size: 0.55rem;
      color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase;
    }

    /* ── ACTION BUTTONS ── */
    .action-bar {
      display: flex; gap: 0.8rem; flex-wrap: wrap;
      padding: 1.5rem 2rem;
      border-top: 1px solid var(--border);
    }
    .action-btn {
      font-family: var(--font-mono); font-size: 0.7rem;
      letter-spacing: 0.08em;
      padding: 0.6rem 1.2rem; border-radius: 5px;
      border: 1px solid var(--border);
      background: #1a1714; color: var(--paper);
      text-decoration: none; cursor: pointer;
      transition: all 0.2s;
    }
    .action-btn:hover { background: #2a2520; border-color: var(--muted); }
    .action-btn.primary { background: var(--vermillion); border-color: var(--vermillion); }
    .action-btn.primary:hover { background: #a93226; }

    /* ── LOADING ── */
    #loadingState {
      display: flex; flex-direction: column;
      align-items: center; gap: 1rem;
      padding: 6rem 2rem;
      color: var(--muted); font-family: var(--font-mono);
      font-size: 0.75rem; letter-spacing: 0.15em;
    }
    .loader {
      width: 32px; height: 32px;
      border: 2px solid var(--border);
      border-top-color: var(--vermillion);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 600px) {
      .topnav, .hero-info, .info-block,
      .words-block, .mnemonic-block,
      .stats-block, .action-bar { padding-left: 1.1rem; padding-right: 1.1rem; }
    }
  </style>
</head>
<body>

  <nav class="topnav">
    <a href="javascript:history.back()" class="back-link">← indietro</a>
    <div class="nav-actions" id="navActions"></div>
  </nav>

  <div id="loadingState"><div class="loader"></div>CARICAMENTO…</div>
  <div id="pageContent" style="display:none"></div>

  <script src="js/storage.js"></script>
  <script src="js/db.js"></script>
  <script>
    const params  = new URLSearchParams(location.search);
    const kanjiChar = decodeURIComponent(params.get('k') || '');

    const levelNames = ['Mai visto', 'Scarso', 'Medio', 'Buono', 'Ottimo'];
    const levelColors = ['var(--muted)', 'var(--l1)', 'var(--l2)', 'var(--l3)', 'var(--l4)'];

    async function init() {
      await loadDB();
      const k = findKanji(kanjiChar);

      document.getElementById('loadingState').style.display = 'none';

      if (!k) {
        document.getElementById('pageContent').innerHTML =
          `<div style="padding:4rem 2rem;text-align:center;font-family:var(--font-mono);color:var(--muted)">
            Kanji non trovato: "${kanjiChar}"
          </div>`;
        document.getElementById('pageContent').style.display = 'block';
        return;
      }

      const stats = getAllStats();
      const s     = stats[k.kanji] || { level: 0, avg: null, srsSeen: 0, writeSeen: 0 };
      const srsRec = getSRSRecord(k.kanji);

      // Nav links
      document.getElementById('navActions').innerHTML = `
        <a class="ext-link" href="https://kai.kanjiapi.dev/#!/${encodeURIComponent(k.kanji)}" target="_blank" rel="noopener">
          kai.kanjiapi ↗
        </a>`;

      // Level pips
      const pipHTML = [1,2,3,4].map(i => {
        const fill = s.level >= i ? `filled-${s.level}` : '';
        return `<div class="level-pip ${fill}"></div>`;
      }).join('');

      // Readings tags
      const onTags  = k.on  ? k.on.split(/[、,，\s]+/).filter(Boolean).map(r => `<span class="reading-tag">${r}</span>`).join('') : '—';
      const kunTags = k.kun ? k.kun.split(/[、,，\s]+/).filter(Boolean).map(r => `<span class="reading-tag">${r}</span>`).join('') : '—';

      // Words
      const wordsHTML = k.words.length
        ? k.words.map(w => {
            const bare = w.replace(/[「」【】〔〕\[\]（）()]/g, '').trim().split(/[\s　]/)[0];
            return `<a class="word-chip"
              href="https://jisho.org/search/${encodeURIComponent(bare)}"
              target="_blank" rel="noopener">
              ${w}<span class="word-chip-arrow">↗</span>
            </a>`;
          }).join('')
        : '<span style="font-family:var(--font-mono);font-size:0.7rem;color:var(--muted)">Nessuna parola nel database</span>';

      // Mnemonic
      const mnemSaved = getMnemonic(k.kanji);

      // SRS stats
      const accuracy = srsRec.totalSeen ? Math.round(srsRec.totalCorrect / srsRec.totalSeen * 100) : null;
      const nextDue   = srsRec.totalSeen
        ? new Date(srsRec.dueDate).toLocaleDateString('it-IT', { day:'2-digit', month:'short' })
        : '—';

      const html = `
        <!-- HERO -->
        <div class="hero">
          <div class="hero-kanji-col">
            <div class="hero-kanji-shadow">${k.kanji}</div>
            <div class="hero-kanji">${k.kanji}</div>
          </div>
          <div class="hero-info">
            <div class="hero-heisig-badge">HEISIG #${k.id}</div>
            <div class="hero-keyword">${k.keyword}</div>
            <div class="hero-level-bar">
              <div class="level-pip-row">${pipHTML}</div>
              <div class="level-label" style="color:${levelColors[s.level]}">${levelNames[s.level]}</div>
              ${s.avg !== null ? `<div class="level-label">${Math.round(s.avg*100)}%</div>` : ''}
            </div>
          </div>
        </div>

        <!-- CONTENT GRID -->
        <div class="content">

          <div class="info-block">
            <div class="block-label">On-yomi</div>
            <div class="block-value readings">${onTags}</div>
          </div>

          <div class="info-block">
            <div class="block-label">Kun-yomi</div>
            <div class="block-value readings">${kunTags}</div>
          </div>

          <div class="info-block" style="grid-column:1/-1; border-right:none">
            <div class="block-label">Significati</div>
            <div class="block-value meanings">${k.meanings || '—'}</div>
          </div>

          <!-- PAROLE COMUNI -->
          <div class="words-block">
            <div class="block-label">Parole comuni</div>
            <div class="words-grid">${wordsHTML}</div>
          </div>

          <!-- MNEMONICO -->
          <div class="mnemonic-block">
            <div class="mnemonic-header">
              <div class="block-label" style="margin:0">🧠 Mnemonico</div>
              <button class="mnemonic-toggle-btn" id="mnemoToggle" onclick="toggleMnemo()">
                ${mnemSaved ? 'mostra' : 'aggiungi'}
              </button>
            </div>
            <div class="mnemonic-content ${mnemSaved ? '' : ''}" id="mnemoContent">
              <textarea id="mnemonicText"
                placeholder="Scrivi un mnemonico per ricordare questo kanji…"
              >${mnemSaved}</textarea>
              <button class="mnemonic-save-btn" id="mnemoSaveBtn" onclick="saveMnemo()">salva</button>
            </div>
          </div>

          <!-- STATISTICHE -->
          <div class="stats-block">
            <div class="stat-item">
              <div class="stat-val">${srsRec.totalSeen}</div>
              <div class="stat-lbl">Ripetizioni SRS</div>
            </div>
            <div class="stat-item">
              <div class="stat-val">${accuracy !== null ? accuracy + '%' : '—'}</div>
              <div class="stat-lbl">Accuratezza</div>
            </div>
            <div class="stat-item">
              <div class="stat-val">${srsRec.interval || 0}</div>
              <div class="stat-lbl">Intervallo (gg)</div>
            </div>
            <div class="stat-item">
              <div class="stat-val">${nextDue}</div>
              <div class="stat-lbl">Prossimo ripasso</div>
            </div>
          </div>

        </div>

        <!-- ACTION BAR -->
        <div class="action-bar">
          <a class="action-btn primary" href="flashcard.html">Studia ora →</a>
          <a class="action-btn" href="writing.html?k=${encodeURIComponent(k.kanji)}">Scrivi →</a>
          <a class="action-btn" href="review.html">← Riepilogo</a>
        </div>
      `;

      document.getElementById('pageContent').innerHTML = html;
      document.getElementById('pageContent').style.display = 'block';
      document.title = `${k.kanji} ${k.keyword} — KanjiBaby`;
    }

    function toggleMnemo() {
      const content = document.getElementById('mnemoContent');
      const btn     = document.getElementById('mnemoToggle');
      const vis     = content.classList.toggle('visible');
      btn.textContent = vis ? 'nascondi' : 'mostra';
    }

    function saveMnemo() {
      const k    = kanjiChar;
      const text = document.getElementById('mnemonicText').value;
      setMnemonic(k, text);
      const btn = document.getElementById('mnemoSaveBtn');
      btn.textContent = 'salvato ✓';
      btn.classList.add('saved');
      setTimeout(() => { btn.textContent = 'salva'; btn.classList.remove('saved'); }, 1800);
    }

    init();
  </script>
</body>
</html>
