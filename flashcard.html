<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flashcard — KanjiBaby</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:        #0f0e0d;
      --paper:      #f5f0e8;
      --paper2:     #ede7d9;
      --vermillion: #c0392b;
      --vermillion2:#e74c3c;
      --gold:       #b8860b;
      --muted:      #8a7f72;
      --border:     #2a2520;
      --card-bg:    #161310;
      --correct:    #27ae60;
      --wrong:      #c0392b;

      --font-jp:    'Shippori Mincho', serif;
      --font-mono:  'DM Mono', monospace;
      --font-sans:  'Noto Sans JP', sans-serif;
    }

    body {
      background: var(--ink);
      color: var(--paper);
      font-family: var(--font-sans);
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── TOP NAV ──────────────────────────────────────────── */
    .topnav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.2rem 2rem;
      border-bottom: 1px solid var(--border);
    }
    .back-link {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.1em;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--paper); }
    .topnav-title {
      font-family: var(--font-jp);
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.05em;
    }
    .topnav-right {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--muted);
      text-align: right;
    }
    #queueCount { color: var(--vermillion); font-size: 0.85rem; }

    /* ── PROGRESS BAR ─────────────────────────────────────── */
    .progress-bar-wrap {
      height: 3px;
      background: var(--border);
    }
    .progress-bar-fill {
      height: 100%;
      background: var(--vermillion);
      width: 0%;
      transition: width 0.4s ease;
    }

    /* ── MAIN LAYOUT ──────────────────────────────────────── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      gap: 1.5rem;
    }

    /* ── CARD ─────────────────────────────────────────────── */
    .card-scene {
      width: 100%;
      max-width: 480px;
      perspective: 1200px;
    }
    .card {
      position: relative;
      width: 100%;
      min-height: 320px;
      transform-style: preserve-3d;
      transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
    }
    .card.flipped { transform: rotateY(180deg); }

    .card-face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--card-bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow: hidden;
    }
    .card-back {
      transform: rotateY(180deg);
      align-items: flex-start;
      justify-content: flex-start;
      padding: 1.8rem 2rem;
    }

    /* FRONT */
    .card-kanji-big {
      font-family: var(--font-jp);
      font-size: clamp(5rem, 18vw, 8rem);
      font-weight: 800;
      color: var(--paper);
      line-height: 1;
      letter-spacing: -0.02em;
      margin-bottom: 1rem;
      transition: transform 0.2s;
    }
    .card-hint {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-top: 0.5rem;
    }
    .card-number-badge {
      position: absolute;
      top: 1rem; right: 1.2rem;
      font-family: var(--font-mono);
      font-size: 0.6rem;
      color: var(--border);
      letter-spacing: 0.1em;
    }

    /* BACK */
    .back-section { width: 100%; margin-bottom: 1.1rem; }
    .back-label {
      font-family: var(--font-mono);
      font-size: 0.55rem;
      color: var(--muted);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin-bottom: 0.3rem;
    }
    .back-value {
      font-family: var(--font-jp);
      font-size: 1rem;
      color: var(--paper);
      font-weight: 400;
      line-height: 1.5;
    }
    .back-value.keyword {
      font-size: 1.4rem;
      font-weight: 600;
      color: var(--vermillion);
    }
    .back-value.readings {
      font-size: 0.95rem;
      color: var(--paper2);
    }
    .back-kanji-small {
      position: absolute;
      bottom: 1rem; right: 1.2rem;
      font-family: var(--font-jp);
      font-size: 3rem;
      font-weight: 800;
      color: rgba(255,255,255,0.04);
      pointer-events: none;
    }

    /* DIVIDER on back */
    .back-divider {
      width: 100%;
      height: 1px;
      background: var(--border);
      margin: 0.8rem 0;
    }

    /* ── MNEMONIC BOX ─────────────────────────────────────── */
    .mnemonic-wrap {
      width: 100%;
      max-width: 480px;
    }
    .mnemonic-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.5rem;
    }
    .mnemonic-label {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }
    .mnemonic-toggle-btn {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      color: var(--muted);
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.25rem 0.6rem;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }
    .mnemonic-toggle-btn:hover { color: var(--paper); border-color: var(--muted); }

    .mnemonic-content {
      display: none;
    }
    .mnemonic-content.visible { display: block; }

    #mnemonicText {
      width: 100%;
      min-height: 70px;
      background: #1a1714;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--paper);
      font-family: var(--font-mono);
      font-size: 0.78rem;
      padding: 0.7rem 0.9rem;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
      line-height: 1.5;
    }
    #mnemonicText:focus { border-color: var(--vermillion); }
    #mnemonicText::placeholder { color: var(--muted); font-style: italic; }

    .mnemonic-save-btn {
      margin-top: 0.4rem;
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--muted);
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.3rem 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .mnemonic-save-btn:hover { color: var(--paper); border-color: var(--muted); }
    .mnemonic-save-btn.saved { color: var(--correct); border-color: var(--correct); }

    /* ── ANSWER BUTTONS ───────────────────────────────────── */
    .answer-area {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.8rem;
    }

    .flip-btn {
      width: 100%;
      padding: 0.9rem;
      background: #1e1b17;
      border: 1px solid #2e2924;
      border-radius: 8px;
      color: var(--paper);
      font-family: var(--font-mono);
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }
    .flip-btn:hover { background: #2a2520; border-color: var(--muted); }

    .answer-btns {
      width: 100%;
      display: none;
      gap: 0.8rem;
    }
    .answer-btns.show { display: flex; }

    .btn-correct, .btn-wrong {
      flex: 1;
      padding: 0.9rem;
      border: none;
      border-radius: 8px;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }
    .btn-correct:hover, .btn-wrong:hover { opacity: 0.85; transform: translateY(-1px); }
    .btn-correct { background: var(--correct); color: #fff; }
    .btn-wrong   { background: var(--wrong);   color: #fff; }

    /* ── EMPTY STATE ──────────────────────────────────────── */
    #emptyState {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 1.2rem;
      text-align: center;
    }
    .empty-kanji {
      font-family: var(--font-jp);
      font-size: 5rem;
      color: rgba(255,255,255,0.06);
    }
    .empty-title {
      font-family: var(--font-jp);
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--paper);
    }
    .empty-sub {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--muted);
      line-height: 1.7;
    }
    .empty-stats {
      display: flex;
      gap: 2rem;
      margin-top: 0.5rem;
    }
    .empty-stat { display: flex; flex-direction: column; align-items: center; gap: 0.2rem; }
    .empty-stat-val {
      font-family: var(--font-jp);
      font-size: 1.8rem;
      font-weight: 600;
      color: var(--paper);
    }
    .empty-stat-lbl {
      font-family: var(--font-mono);
      font-size: 0.58rem;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    /* ── LOADING ──────────────────────────────────────────── */
    #loadingState {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 0.75rem;
      letter-spacing: 0.15em;
    }
    .loader {
      width: 32px; height: 32px;
      border: 2px solid var(--border);
      border-top-color: var(--vermillion);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── SESSION RESULT TOAST ─────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 2rem; left: 50%;
      transform: translateX(-50%) translateY(4rem);
      background: #1e1b17;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 1.5rem;
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--paper);
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      z-index: 50;
      white-space: nowrap;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .toast .correct-col { color: var(--correct); }
    .toast .wrong-col   { color: var(--wrong);   }

    @media (max-width: 520px) {
      .card-face { padding: 1.5rem; }
    }
  </style>
</head>
<body>

  <!-- TOP NAV -->
  <nav class="topnav">
    <a href="index.html" class="back-link">← home</a>
    <div class="topnav-title">読む · Flashcard</div>
    <div class="topnav-right">
      Da rivedere<br>
      <span id="queueCount">–</span>
    </div>
  </nav>
  <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressBar"></div></div>

  <!-- MAIN -->
  <main id="mainArea">

    <!-- LOADING -->
    <div id="loadingState">
      <div class="loader"></div>
      CARICAMENTO…
    </div>

    <!-- EMPTY (tutti rivisti) -->
    <div id="emptyState">
      <div class="empty-kanji">🎉</div>
      <div class="empty-title">Sessione completata!</div>
      <div class="empty-sub">
        Non ci sono kanji da rivedere adesso.<br>
        Torna più tardi — il SRS deciderà quando è il momento giusto.
      </div>
      <div class="empty-stats">
        <div class="empty-stat">
          <div class="empty-stat-val" id="sess-correct">0</div>
          <div class="empty-stat-lbl">Corretti</div>
        </div>
        <div class="empty-stat">
          <div class="empty-stat-val" id="sess-wrong">0</div>
          <div class="empty-stat-lbl">Sbagliati</div>
        </div>
        <div class="empty-stat">
          <div class="empty-stat-val" id="sess-total">0</div>
          <div class="empty-stat-lbl">Totali</div>
        </div>
      </div>
    </div>

    <!-- CARD -->
    <div class="card-scene" id="cardScene" style="display:none">
      <div class="card" id="flashcard" onclick="flipCard()">
        <!-- FRONT -->
        <div class="card-face card-front">
          <div class="card-number-badge" id="cardBadge">#1</div>
          <div class="card-kanji-big" id="cardKanji">漢</div>
          <div class="card-hint">tocca per girare</div>
        </div>
        <!-- BACK -->
        <div class="card-face card-back">
          <div class="card-number-badge" id="cardBadgeBack">#1</div>
          <div class="back-section">
            <div class="back-label">Heisig Keyword</div>
            <div class="back-value keyword" id="backKeyword">–</div>
          </div>
          <div class="back-divider"></div>
          <div class="back-section">
            <div class="back-label">Significati</div>
            <div class="back-value" id="backMeanings">–</div>
          </div>
          <div class="back-section" id="backOnWrap">
            <div class="back-label">On-yomi</div>
            <div class="back-value readings" id="backOn">–</div>
          </div>
          <div class="back-section" id="backKunWrap">
            <div class="back-label">Kun-yomi</div>
            <div class="back-value readings" id="backKun">–</div>
          </div>
          <div class="back-kanji-small" id="backKanjiSmall">漢</div>
        </div>
      </div>
    </div>

    <!-- MNEMONIC BOX -->
    <div class="mnemonic-wrap" id="mnemonicWrap" style="display:none">
      <div class="mnemonic-header">
        <span class="mnemonic-label">🧠 Mnemonico</span>
        <button class="mnemonic-toggle-btn" id="mnemonicToggleBtn" onclick="toggleMnemonic()">mostra</button>
      </div>
      <div class="mnemonic-content" id="mnemonicContent">
        <textarea id="mnemonicText" placeholder="Scrivi un mnemonico per ricordare questo kanji…" rows="3"></textarea>
        <button class="mnemonic-save-btn" id="mnemonicSaveBtn" onclick="saveMnemonic()">salva</button>
      </div>
    </div>

    <!-- ANSWER AREA -->
    <div class="answer-area" id="answerArea" style="display:none">
      <button class="flip-btn" id="flipBtn" onclick="flipCard()">Gira la carta →</button>
      <div class="answer-btns" id="answerBtns">
        <button class="btn-wrong"    onclick="answer(false)">✗ &nbsp;Non ricordavo</button>
        <button class="btn-correct"  onclick="answer(true)">✓ &nbsp;Ricordato</button>
      </div>
    </div>

  </main>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <script src="js/storage.js"></script>
  <script src="js/db.js"></script>
  <script>
    // ── STATE ──────────────────────────────────────────────
    let queue         = [];
    let currentIndex  = 0;
    let isFlipped     = false;
    let sessionCorrect = 0;
    let sessionWrong   = 0;
    let sessionTotal   = 0;
    let mnemoVisible  = false;

    // ── INIT ───────────────────────────────────────────────
    async function init() {
      const db = await loadDB();
      if (!db.length) { showToast('Errore caricamento database', 3000); return; }

      const active = getActiveKanji();
      queue = getDueKanji(active);

      document.getElementById('queueCount').textContent = queue.length;
      document.getElementById('loadingState').style.display = 'none';

      if (!queue.length) {
        showEmpty();
      } else {
        showCard(0);
      }
    }

    // ── SHOW CARD ──────────────────────────────────────────
    function showCard(idx) {
      if (idx >= queue.length) { showEmpty(); return; }

      isFlipped = false;
      mnemoVisible = false;

      const k = queue[idx];

      // Reset flip
      const card = document.getElementById('flashcard');
      card.classList.remove('flipped');

      // Front
      document.getElementById('cardKanji').textContent    = k.kanji;
      document.getElementById('cardBadge').textContent    = `#${k.id}`;
      document.getElementById('cardBadgeBack').textContent= `#${k.id}`;

      // Back
      document.getElementById('backKanjiSmall').textContent = k.kanji;
      document.getElementById('backKeyword').textContent    = k.keyword || '—';
      document.getElementById('backMeanings').textContent   = k.meanings || '—';

      const onEl  = document.getElementById('backOn');
      const kunEl = document.getElementById('backKun');
      const onW   = document.getElementById('backOnWrap');
      const kunW  = document.getElementById('backKunWrap');

      if (k.on)  { onEl.textContent  = k.on;  onW.style.display  = 'block'; }
      else        { onW.style.display  = 'none'; }
      if (k.kun) { kunEl.textContent = k.kun; kunW.style.display = 'block'; }
      else        { kunW.style.display = 'none'; }

      // Mnemonic
      const mnemoEl = document.getElementById('mnemonicText');
      mnemoEl.value = getMnemonic(k.kanji);
      document.getElementById('mnemonicContent').classList.remove('visible');
      document.getElementById('mnemonicToggleBtn').textContent = 'mostra';
      document.getElementById('mnemonicSaveBtn').classList.remove('saved');

      // UI
      document.getElementById('flipBtn').style.display      = 'block';
      document.getElementById('answerBtns').classList.remove('show');
      document.getElementById('cardScene').style.display    = 'block';
      document.getElementById('mnemonicWrap').style.display = 'block';
      document.getElementById('answerArea').style.display   = 'flex';
      document.getElementById('emptyState').style.display   = 'none';

      updateProgress(idx);
    }

    // ── FLIP ───────────────────────────────────────────────
    function flipCard() {
      if (isFlipped) return;
      isFlipped = true;
      document.getElementById('flashcard').classList.add('flipped');
      document.getElementById('flipBtn').style.display = 'none';
      document.getElementById('answerBtns').classList.add('show');
    }

    // ── ANSWER ─────────────────────────────────────────────
    function answer(correct) {
      const k = queue[currentIndex];
      updateSRS(k.kanji, correct);

      sessionTotal++;
      if (correct) sessionCorrect++; else sessionWrong++;

      if (!correct) {
        // Rimetti in coda (tra 3–5 carte)
        const reinsert = Math.min(currentIndex + 4, queue.length);
        queue.splice(reinsert, 0, { ...k });
        document.getElementById('queueCount').textContent = queue.length - currentIndex - 1;
      } else {
        document.getElementById('queueCount').textContent = queue.length - currentIndex - 1;
      }

      showToastResult(correct);
      currentIndex++;
      showCard(currentIndex);
    }

    // ── MNEMONIC ───────────────────────────────────────────
    function toggleMnemonic() {
      mnemoVisible = !mnemoVisible;
      const content = document.getElementById('mnemonicContent');
      const btn     = document.getElementById('mnemonicToggleBtn');
      content.classList.toggle('visible', mnemoVisible);
      btn.textContent = mnemoVisible ? 'nascondi' : 'mostra';
    }

    function saveMnemonic() {
      const k    = queue[currentIndex];
      if (!k) return;
      const text = document.getElementById('mnemonicText').value;
      setMnemonic(k.kanji, text);
      const btn = document.getElementById('mnemonicSaveBtn');
      btn.textContent = 'salvato ✓';
      btn.classList.add('saved');
      setTimeout(() => { btn.textContent = 'salva'; btn.classList.remove('saved'); }, 1800);
    }

    // ── PROGRESS BAR ───────────────────────────────────────
    function updateProgress(idx) {
      const total = queue.length;
      const pct   = total ? Math.round((idx / total) * 100) : 0;
      document.getElementById('progressBar').style.width = pct + '%';
    }

    // ── EMPTY STATE ────────────────────────────────────────
    function showEmpty() {
      document.getElementById('cardScene').style.display    = 'none';
      document.getElementById('mnemonicWrap').style.display = 'none';
      document.getElementById('answerArea').style.display   = 'none';
      document.getElementById('emptyState').style.display   = 'flex';
      document.getElementById('progressBar').style.width    = '100%';

      document.getElementById('sess-correct').textContent = sessionCorrect;
      document.getElementById('sess-wrong').textContent   = sessionWrong;
      document.getElementById('sess-total').textContent   = sessionTotal;
    }

    // ── TOAST ──────────────────────────────────────────────
    function showToastResult(correct) {
      const t = document.getElementById('toast');
      t.innerHTML = correct
        ? `<span class="correct-col">✓ Corretto</span> — ripasso tra ${getNextInterval(queue[currentIndex]?.kanji)} gg`
        : `<span class="wrong-col">✗ Da rivedere</span> — riappare tra poco`;
      showToast(null, 1800);
    }

    function showToast(msg, ms) {
      const t = document.getElementById('toast');
      if (msg) t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), ms || 1800);
    }

    function getNextInterval(kanji) {
      if (!kanji) return '?';
      const rec = getSRSRecord(kanji);
      return rec.interval || 1;
    }

    // ── KEYBOARD ───────────────────────────────────────────
    document.addEventListener('keydown', e => {
      if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); if (!isFlipped) flipCard(); }
      if (e.key === 'ArrowRight' && isFlipped) answer(true);
      if (e.key === 'ArrowLeft'  && isFlipped) answer(false);
    });

    // ── GO ─────────────────────────────────────────────────
    init();
  </script>
</body>
</html>
