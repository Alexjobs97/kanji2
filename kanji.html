<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kanji — KanjiBaby</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;800&family=Hina+Mincho&family=Klee+One&family=Zen+Kurenaido&family=DM+Mono:ital,wght@0,300;0,400;1,300&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --ink:#0f0e0d; --paper:#f5f0e8; --paper2:#d8d0c4;
      --vermillion:#c0392b; --gold:#b8860b;
      --muted:#9a9088; --border:#333028; --card-bg:#1c1915;
      --correct:#27ae60; --l1:#c0392b; --l2:#b8860b; --l3:#27ae60; --l4:#2980b9;
      --font-jp:'Shippori Mincho',serif;
      --font-mono:'DM Mono',monospace;
      --font-sans:'Noto Sans JP',sans-serif;
    }
    :root[data-font="hina"] { --font-jp:'Hina Mincho',serif; }
    :root[data-font="klee"] { --font-jp:'Klee One',cursive; }
    :root[data-font="zen"]  { --font-jp:'Zen Kurenaido',sans-serif; }
    :root[data-theme="light"]{
      --ink:#f0ebe0; --paper:#1a1714; --paper2:#3a3228;
      --border:#c8bfb0; --card-bg:#e8e0d4; --muted:#6a5f52;
    }
    body{background:var(--ink);color:var(--paper);font-family:var(--font-sans);font-weight:300;min-height:100vh;}

    .topnav{display:flex;align-items:center;justify-content:space-between;padding:1.2rem 2rem;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--ink);z-index:50;}
    .back-link{font-family:var(--font-mono);font-size:.7rem;color:var(--muted);text-decoration:none;letter-spacing:.1em;transition:color .2s;}
    .back-link:hover{color:var(--paper);}
    .nav-actions{display:flex;gap:.8rem;align-items:center;}
    .ext-link{font-family:var(--font-mono);font-size:.65rem;color:var(--muted);text-decoration:none;border:1px solid var(--border);padding:.3rem .7rem;border-radius:4px;transition:all .2s;display:flex;align-items:center;gap:.3rem;}
    .ext-link:hover{color:var(--paper);border-color:var(--muted);}

    /* ── HERO ── */
    .hero{display:flex;align-items:stretch;border-bottom:1px solid var(--border);min-height:200px;}
    .hero-kanji-col{width:clamp(140px,24vw,220px);display:flex;align-items:center;justify-content:center;border-right:1px solid var(--border);position:relative;overflow:hidden;background:#0d0b09;flex-shrink:0;}
    :root[data-theme="light"] .hero-kanji-col{background:#e0d8cc;}
    .hero-kanji{font-family:var(--font-jp);font-size:clamp(5rem,13vw,9rem);font-weight:800;color:var(--paper);line-height:1;position:relative;z-index:2;}
    .hero-kanji-shadow{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--font-jp);font-size:clamp(7rem,18vw,13rem);font-weight:800;color:rgba(255,255,255,0.04);pointer-events:none;}
    :root[data-theme="light"] .hero-kanji-shadow{color:rgba(0,0,0,0.04);}
    .hero-info{flex:1;padding:1.8rem 2rem;display:flex;flex-direction:column;justify-content:center;gap:.7rem;}
    .hero-keyword{font-family:var(--font-jp);font-size:clamp(1.5rem,3.5vw,2.4rem);font-weight:600;line-height:1.1;}
    .hero-heisig-badge{display:inline-flex;align-items:center;font-family:var(--font-mono);font-size:.6rem;color:var(--vermillion);border:1px solid rgba(192,57,43,.35);padding:.2rem .55rem;border-radius:3px;letter-spacing:.15em;width:fit-content;}
    .hero-level-bar{display:flex;align-items:center;gap:1rem;}
    .level-pip-row{display:flex;gap:4px;}
    .level-pip{width:24px;height:4px;border-radius:2px;background:var(--border);transition:background .3s;}
    .level-pip.f1{background:var(--l1);} .level-pip.f2{background:var(--l2);} .level-pip.f3{background:var(--l3);} .level-pip.f4{background:var(--l4);}
    .level-label{font-family:var(--font-mono);font-size:.6rem;color:var(--muted);letter-spacing:.1em;}

    /* ── CONTENT GRID ── */
    .content{display:grid;grid-template-columns:1fr 1fr;}
    @media(max-width:700px){.content{grid-template-columns:1fr;}}
    .info-block{padding:1.5rem 2rem;border-bottom:1px solid var(--border);}
    .info-block:nth-child(odd){border-right:1px solid var(--border);}
    @media(max-width:700px){.info-block:nth-child(odd){border-right:none;}}
    .block-label{font-family:var(--font-mono);font-size:.55rem;color:var(--muted);letter-spacing:.25em;text-transform:uppercase;margin-bottom:.5rem;}
    .block-value{font-family:var(--font-jp);font-size:1rem;color:var(--paper);line-height:1.6;}
    .block-value.readings{font-size:1.05rem;letter-spacing:.05em;}
    .reading-tag{display:inline-block;background:var(--card-bg);border:1px solid var(--border);border-radius:4px;padding:.15rem .5rem;margin:.1rem .15rem .1rem 0;font-size:.92rem;}

    /* ── PAROLE — stile kanjiapi ── */
    .words-block{grid-column:1/-1;padding:1.5rem 2rem;border-bottom:1px solid var(--border);}
    .words-list{margin-top:.8rem;display:flex;flex-direction:column;gap:.5rem;}
    .word-row{display:flex;align-items:baseline;gap:1rem;padding:.55rem .8rem;border-radius:6px;border:1px solid var(--border);background:var(--card-bg);transition:border-color .2s;}
    .word-row:hover{border-color:var(--gold);}
    .word-main{font-family:var(--font-jp);font-size:1.35rem;font-weight:600;color:var(--paper);text-decoration:none;flex-shrink:0;min-width:3.5rem;transition:color .2s;}
    .word-main:hover{color:var(--gold);}
    .word-details{flex:1;display:flex;flex-direction:column;gap:.15rem;}
    .word-reading{font-family:var(--font-jp);font-size:.82rem;color:var(--vermillion);}
    .word-meaning{font-family:var(--font-sans);font-size:.75rem;color:var(--paper2);line-height:1.4;}

    /* ── MNEMONICO ── */
    .mnemonic-block{grid-column:1/-1;padding:1.5rem 2rem;border-bottom:1px solid var(--border);}
    .mnemonic-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.7rem;}
    .mnemonic-toggle-btn{font-family:var(--font-mono);font-size:.6rem;color:var(--muted);background:none;border:1px solid var(--border);border-radius:4px;padding:.25rem .6rem;cursor:pointer;transition:all .2s;}
    .mnemonic-toggle-btn:hover{color:var(--paper);border-color:var(--muted);}
    .mnemonic-existing{font-family:var(--font-mono);font-size:.8rem;color:var(--paper);line-height:1.6;padding:.7rem .9rem;background:var(--card-bg);border:1px solid var(--border);border-radius:6px;white-space:pre-wrap;}
    .mnemonic-edit-area{display:none;}
    .mnemonic-edit-area.visible{display:block;}
    #mnemonicText{width:100%;min-height:70px;background:var(--card-bg);border:1px solid var(--border);border-radius:6px;color:var(--paper);font-family:var(--font-mono);font-size:.78rem;padding:.7rem .9rem;resize:vertical;outline:none;transition:border-color .2s;line-height:1.5;}
    #mnemonicText:focus{border-color:var(--vermillion);}
    #mnemonicText::placeholder{color:var(--muted);font-style:italic;}
    .mnemonic-save-btn{margin-top:.4rem;font-family:var(--font-mono);font-size:.65rem;color:var(--muted);background:none;border:1px solid var(--border);border-radius:4px;padding:.3rem .8rem;cursor:pointer;transition:all .2s;}
    .mnemonic-save-btn:hover{color:var(--paper);border-color:var(--muted);}
    .mnemonic-save-btn.saved{color:var(--correct);border-color:var(--correct);}

    /* ── STATS ── */
    .stats-block{grid-column:1/-1;padding:1.5rem 2rem;display:flex;gap:2rem;flex-wrap:wrap;}
    .stat-item{display:flex;flex-direction:column;gap:.15rem;}
    .stat-val{font-family:var(--font-jp);font-size:1.5rem;font-weight:600;line-height:1;}
    .stat-lbl{font-family:var(--font-mono);font-size:.55rem;color:var(--muted);letter-spacing:.15em;text-transform:uppercase;}

    /* ── ACTION BAR ── */
    .action-bar{display:flex;gap:.8rem;flex-wrap:wrap;padding:1.5rem 2rem;border-top:1px solid var(--border);}
    .action-btn{font-family:var(--font-mono);font-size:.7rem;letter-spacing:.08em;padding:.6rem 1.2rem;border-radius:5px;border:1px solid var(--border);background:var(--card-bg);color:var(--paper);text-decoration:none;cursor:pointer;transition:all .2s;}
    .action-btn:hover{background:#2a2520;border-color:var(--muted);}
    .action-btn.primary{background:var(--vermillion);border-color:var(--vermillion);}
    .action-btn.primary:hover{background:#a93226;}

    /* ── LOADING ── */
    #loadingState{display:flex;flex-direction:column;align-items:center;gap:1rem;padding:6rem 2rem;color:var(--muted);font-family:var(--font-mono);font-size:.75rem;letter-spacing:.15em;}
    .loader{width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--vermillion);border-radius:50%;animation:spin .8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}

    @media(max-width:600px){
      .topnav,.hero-info,.info-block,.words-block,.mnemonic-block,.stats-block,.action-bar{padding-left:1.1rem;padding-right:1.1rem;}
    }
  </style>
</head>
<body>
<nav class="topnav">
  <a href="javascript:history.back()" class="back-link">← indietro</a>
  <div class="nav-actions" id="navActions"></div>
</nav>

<div id="loadingState"><div class="loader"></div>CARICAMENTO…</div>
<div id="pageContent" style="display:none"></div>

<script src="js/storage.js"></script>
<script src="js/db.js"></script>
<script>
  initSync();
  const params    = new URLSearchParams(location.search);
  const kanjiChar = decodeURIComponent(params.get('k')||'');
  const levelNames  = ['Mai visto','Scarso','Medio','Buono','Ottimo'];
  const levelColors = ['var(--muted)','var(--l1)','var(--l2)','var(--l3)','var(--l4)'];

  async function init() {
    await loadDB();
    const k = findKanji(kanjiChar);
    document.getElementById('loadingState').style.display='none';

    if (!k) {
      document.getElementById('pageContent').innerHTML=
        `<div style="padding:4rem 2rem;text-align:center;font-family:var(--font-mono);color:var(--muted)">Kanji non trovato: "${kanjiChar}"</div>`;
      document.getElementById('pageContent').style.display='block';
      return;
    }

    const stats  = getAllStats();
    const s      = stats[k.kanji] || { level:0, avg:null, srsSeen:0 };
    const srsRec = getSRSRecord(k.kanji);
    const mnem   = getMnemonic(k.kanji);

    document.getElementById('navActions').innerHTML=
      `<a class="ext-link" href="https://kai.kanjiapi.dev/#!/${encodeURIComponent(k.kanji)}" target="_blank" rel="noopener">kai.kanjiapi ↗</a>`;

    const pipHTML = [1,2,3,4].map(i =>
      `<div class="level-pip ${s.level>=i?'f'+s.level:''}"></div>`).join('');

    const onTags  = k.on  ? k.on.split(/[、,，\s]+/).filter(Boolean).map(r=>`<span class="reading-tag">${r}</span>`).join('') : '—';
    const kunTags = k.kun ? k.kun.split(/[、,，\s]+/).filter(Boolean).map(r=>`<span class="reading-tag">${r}</span>`).join('') : '—';

    // Parole — stile kanjiapi
    const wordsHTML = k.words.length
      ? k.words.map(w=>`
        <div class="word-row">
          <a class="word-main" href="https://jisho.org/search/${encodeURIComponent(w.word)}" target="_blank" rel="noopener">${w.word}</a>
          <div class="word-details">
            <div class="word-reading">${w.reading}</div>
            <div class="word-meaning">${w.meaning}</div>
          </div>
        </div>`).join('')
      : `<div style="font-family:var(--font-mono);font-size:.7rem;color:var(--muted)">Nessuna parola nel database</div>`;

    const accuracy = srsRec.totalSeen ? Math.round(srsRec.totalCorrect/srsRec.totalSeen*100) : null;
    const nextDue  = srsRec.totalSeen
      ? new Date(srsRec.dueDate).toLocaleDateString('it-IT',{day:'2-digit',month:'short'}) : '—';

    // Mnemonico: se presente mostralo sempre, altrimenti bottone aggiungi
    const mnemoSection = mnem
      ? `<div class="mnemonic-block">
          <div class="mnemonic-header">
            <div class="block-label" style="margin:0">🧠 Mnemonico</div>
            <button class="mnemonic-toggle-btn" onclick="toggleMnemoEdit()">modifica</button>
          </div>
          <div class="mnemonic-existing" id="mnemoDisplay">${escHtml(mnem)}</div>
          <div class="mnemonic-edit-area" id="mnemoEdit">
            <textarea id="mnemonicText" rows="3">${escHtml(mnem)}</textarea>
            <button class="mnemonic-save-btn" id="mnemoSaveBtn" onclick="saveMnemo()">salva</button>
          </div>
        </div>`
      : `<div class="mnemonic-block">
          <div class="mnemonic-header">
            <div class="block-label" style="margin:0">🧠 Mnemonico</div>
            <button class="mnemonic-toggle-btn" id="mnemoToggle" onclick="toggleMnemoEdit()">aggiungi</button>
          </div>
          <div class="mnemonic-edit-area" id="mnemoEdit">
            <textarea id="mnemonicText" placeholder="Scrivi un mnemonico…" rows="3"></textarea>
            <button class="mnemonic-save-btn" id="mnemoSaveBtn" onclick="saveMnemo()">salva</button>
          </div>
        </div>`;

    document.getElementById('pageContent').innerHTML=`
      <div class="hero">
        <div class="hero-kanji-col">
          <div class="hero-kanji-shadow">${k.kanji}</div>
          <div class="hero-kanji">${k.kanji}</div>
        </div>
        <div class="hero-info">
          <div class="hero-heisig-badge">HEISIG #${k.id}</div>
          <div class="hero-keyword">${k.keyword}</div>
          <div class="hero-level-bar">
            <div class="level-pip-row">${pipHTML}</div>
            <div class="level-label" style="color:${levelColors[s.level]}">${levelNames[s.level]}</div>
            ${s.avg!==null?`<div class="level-label">${Math.round(s.avg*100)}%</div>`:''}
          </div>
        </div>
      </div>
      <div class="content">
        <div class="info-block"><div class="block-label">On-yomi</div><div class="block-value readings">${onTags}</div></div>
        <div class="info-block"><div class="block-label">Kun-yomi</div><div class="block-value readings">${kunTags}</div></div>
        <div class="info-block" style="grid-column:1/-1;border-right:none"><div class="block-label">Significati</div><div class="block-value" style="font-size:.9rem;color:var(--paper2)">${k.meanings||'—'}</div></div>
        <div class="words-block"><div class="block-label">Parole comuni</div><div class="words-list">${wordsHTML}</div></div>
        ${mnemoSection}
        <div class="stats-block">
          <div class="stat-item"><div class="stat-val">${srsRec.totalSeen}</div><div class="stat-lbl">Ripetizioni SRS</div></div>
          <div class="stat-item"><div class="stat-val">${accuracy!==null?accuracy+'%':'—'}</div><div class="stat-lbl">Accuratezza</div></div>
          <div class="stat-item"><div class="stat-val">${srsRec.interval||0}</div><div class="stat-lbl">Intervallo gg</div></div>
          <div class="stat-item"><div class="stat-val">${nextDue}</div><div class="stat-lbl">Prossimo ripasso</div></div>
        </div>
      </div>
      <div class="action-bar">
        <a class="action-btn primary" href="flashcard.html">Studia ora →</a>
        <a class="action-btn" href="writing.html?k=${encodeURIComponent(k.kanji)}">Scrivi →</a>
        <a class="action-btn" href="review.html">← Riepilogo</a>
      </div>`;

    document.getElementById('pageContent').style.display='block';
    document.title=`${k.kanji} ${k.keyword} — KanjiBaby`;
  }

  function escHtml(t){ return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function toggleMnemoEdit() {
    const edit = document.getElementById('mnemoEdit');
    if (!edit) return;
    const vis = edit.classList.toggle('visible');
    const btn = document.querySelector('.mnemonic-toggle-btn');
    if (btn) btn.textContent = vis ? 'nascondi' : (document.getElementById('mnemoDisplay') ? 'modifica' : 'aggiungi');
  }
  function saveMnemo() {
    const text = document.getElementById('mnemonicText').value;
    setMnemonic(kanjiChar, text);
    const btn = document.getElementById('mnemoSaveBtn');
    btn.textContent='salvato ✓'; btn.classList.add('saved');
    const disp = document.getElementById('mnemoDisplay');
    if (disp) disp.textContent = text;
    setTimeout(()=>{ btn.textContent='salva'; btn.classList.remove('saved'); },1800);
  }

  init();
</script>
</body>
</html>
