<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Scrittura — KanjiBaby</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink:        #0f0e0d;
      --paper:      #f5f0e8;
      --paper2:     #ede7d9;
      --vermillion: #c0392b;
      --gold:       #b8860b;
      --muted:      #8a7f72;
      --border:     #2a2520;
      --card-bg:    #161310;
      --correct:    #27ae60;
      --wrong:      #c0392b;
      --font-jp:    'Shippori Mincho', serif;
      --font-mono:  'DM Mono', monospace;
      --font-sans:  'Noto Sans JP', sans-serif;
    }

    body {
      background: var(--ink);
      color: var(--paper);
      font-family: var(--font-sans);
      font-weight: 300;
      min-height: 100vh;
      display: flex; flex-direction: column;
      /* Prevent scroll while drawing on touch */
      overscroll-behavior: none;
    }

    /* ── TOP NAV ── */
    .topnav {
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 1.2rem 2rem;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .back-link {
      font-family: var(--font-mono); font-size: 0.7rem;
      color: var(--muted); text-decoration: none;
      letter-spacing: 0.1em; transition: color 0.2s;
    }
    .back-link:hover { color: var(--paper); }
    .topnav-title {
      font-family: var(--font-jp); font-size: 1rem; font-weight: 600;
    }
    #queueCount {
      font-family: var(--font-mono); font-size: 0.65rem; color: var(--muted);
    }

    /* ── PROGRESS BAR ── */
    .progress-bar-wrap { height: 3px; background: var(--border); flex-shrink: 0; }
    .progress-bar-fill {
      height: 100%; background: var(--gold);
      width: 0%; transition: width 0.4s ease;
    }

    /* ── MAIN ── */
    main {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: flex-start;
      padding: 1.5rem 1.5rem 2rem;
      gap: 1.2rem; overflow-y: auto;
    }

    /* ── INFO PANEL ── */
    .info-panel {
      width: 100%; max-width: 680px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 1px;
      border: 1px solid var(--border);
      border-radius: 8px; overflow: hidden;
    }
    .info-cell {
      background: var(--card-bg);
      padding: 0.9rem 1.1rem;
    }
    .info-cell-label {
      font-family: var(--font-mono); font-size: 0.55rem;
      color: var(--muted); letter-spacing: 0.2em;
      text-transform: uppercase; margin-bottom: 0.35rem;
    }
    .info-cell-value {
      font-family: var(--font-jp); font-size: 0.9rem;
      color: var(--paper); line-height: 1.5;
    }
    .info-cell-value.keyword {
      font-size: 1.15rem; font-weight: 600;
      color: var(--vermillion);
    }

    /* ── CANVAS AREA ── */
    .canvas-row {
      width: 100%; max-width: 680px;
      display: flex; gap: 1rem; align-items: stretch;
    }

    .canvas-wrap {
      flex: 1; position: relative;
      border: 1px solid var(--border);
      border-radius: 8px; overflow: hidden;
      background: #0d0b09;
      min-height: 240px;
    }
    /* grid guide lines */
    .canvas-wrap::before, .canvas-wrap::after {
      content: '';
      position: absolute; pointer-events: none; z-index: 1;
    }
    .canvas-wrap::before {
      top: 50%; left: 0; right: 0; height: 1px;
      background: rgba(255,255,255,0.05);
    }
    .canvas-wrap::after {
      left: 50%; top: 0; bottom: 0; width: 1px;
      background: rgba(255,255,255,0.05);
    }
    /* diagonal guides */
    .canvas-guide-diag {
      position: absolute; inset: 0; pointer-events: none; z-index: 1;
    }

    #drawCanvas {
      display: block; width: 100%; height: 100%;
      touch-action: none;
      cursor: crosshair;
    }

    /* reveal panel */
    .reveal-wrap {
      width: 200px; flex-shrink: 0;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #0d0b09;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 0.8rem; padding: 1rem;
      min-height: 240px;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .reveal-wrap:hover { border-color: var(--muted); }
    .reveal-label {
      font-family: var(--font-mono); font-size: 0.6rem;
      color: var(--muted); letter-spacing: 0.15em;
      text-transform: uppercase; text-align: center;
    }
    #revealKanji {
      font-family: var(--font-jp);
      font-size: clamp(4rem, 10vw, 7rem);
      font-weight: 800;
      line-height: 1;
      display: none;
    }
    .reveal-eye {
      font-size: 2rem; opacity: 0.3;
      transition: opacity 0.2s;
    }
    .reveal-wrap:hover .reveal-eye { opacity: 0.6; }
    #revealKanji.visible { display: block; }

    /* ── STROKE CONTROLS ── */
    .stroke-controls {
      width: 100%; max-width: 680px;
      display: flex; align-items: center; gap: 0.8rem; flex-wrap: wrap;
    }
    .stroke-btn {
      font-family: var(--font-mono); font-size: 0.65rem;
      color: var(--muted); background: var(--card-bg);
      border: 1px solid var(--border); border-radius: 5px;
      padding: 0.4rem 0.85rem; cursor: pointer;
      transition: all 0.2s; letter-spacing: 0.05em;
    }
    .stroke-btn:hover { color: var(--paper); border-color: var(--muted); }
    .stroke-btn.danger:hover { color: var(--wrong); border-color: var(--wrong); }

    .stroke-size-wrap {
      display: flex; align-items: center; gap: 0.5rem;
      font-family: var(--font-mono); font-size: 0.6rem; color: var(--muted);
    }
    .stroke-size-wrap input[type=range] {
      width: 70px; accent-color: var(--vermillion); cursor: pointer;
    }

    .color-btns {
      display: flex; gap: 0.35rem; margin-left: auto;
    }
    .color-dot {
      width: 20px; height: 20px; border-radius: 50%;
      border: 2px solid transparent; cursor: pointer;
      transition: border-color 0.2s, transform 0.15s;
    }
    .color-dot:hover { transform: scale(1.15); }
    .color-dot.active { border-color: var(--paper); }

    /* ── ANSWER BUTTONS ── */
    .answer-area {
      width: 100%; max-width: 680px;
      display: none; gap: 0.8rem;
    }
    .answer-area.show { display: flex; }
    .btn-correct, .btn-wrong {
      flex: 1; padding: 0.85rem;
      border: none; border-radius: 8px;
      font-family: var(--font-mono); font-size: 0.85rem;
      letter-spacing: 0.05em; cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }
    .btn-correct:hover, .btn-wrong:hover { opacity: 0.85; transform: translateY(-1px); }
    .btn-correct { background: var(--correct); color: #fff; }
    .btn-wrong   { background: var(--wrong);   color: #fff; }

    /* ── EMPTY / LOADING ── */
    #loadingState {
      display: flex; flex-direction: column;
      align-items: center; gap: 1rem;
      padding: 5rem 2rem;
      color: var(--muted); font-family: var(--font-mono);
      font-size: 0.75rem; letter-spacing: 0.15em;
    }
    .loader {
      width: 32px; height: 32px;
      border: 2px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #emptyState {
      display: none; flex-direction: column;
      align-items: center; gap: 1.2rem; text-align: center;
      padding: 4rem 2rem;
    }
    .empty-title { font-family: var(--font-jp); font-size: 1.5rem; font-weight: 600; }
    .empty-sub { font-family: var(--font-mono); font-size: 0.7rem; color: var(--muted); line-height: 1.7; }
    .empty-stats { display: flex; gap: 2rem; margin-top: 0.5rem; }
    .empty-stat { display: flex; flex-direction: column; align-items: center; gap: 0.2rem; }
    .empty-stat-val { font-family: var(--font-jp); font-size: 1.8rem; font-weight: 600; }
    .empty-stat-lbl { font-family: var(--font-mono); font-size: 0.58rem; color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase; }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 2rem; left: 50%;
      transform: translateX(-50%) translateY(4rem);
      background: #1e1b17; border: 1px solid var(--border);
      border-radius: 8px; padding: 0.7rem 1.4rem;
      font-family: var(--font-mono); font-size: 0.75rem; color: var(--paper);
      opacity: 0; transition: opacity 0.3s, transform 0.3s;
      pointer-events: none; z-index: 50; white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .correct-col { color: var(--correct); }
    .wrong-col   { color: var(--wrong);   }

    @media (max-width: 560px) {
      .canvas-row { flex-direction: column; }
      .reveal-wrap { width: 100%; min-height: 140px; flex-direction: row; }
      .topnav, main { padding-left: 1rem; padding-right: 1rem; }
    }
  </style>
</head>
<body>

  <nav class="topnav">
    <a href="index.html" class="back-link">← home</a>
    <div class="topnav-title">書く · Scrittura</div>
    <div id="queueCount">–</div>
  </nav>
  <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressBar"></div></div>

  <main id="mainArea">

    <!-- LOADING -->
    <div id="loadingState"><div class="loader"></div>CARICAMENTO…</div>

    <!-- EMPTY -->
    <div id="emptyState">
      <div style="font-size:3rem">✏️</div>
      <div class="empty-title">Sessione completata!</div>
      <div class="empty-sub">Hai scritto tutti i kanji di questa sessione.</div>
      <div class="empty-stats">
        <div class="empty-stat"><div class="empty-stat-val" id="sess-correct">0</div><div class="empty-stat-lbl">Corretti</div></div>
        <div class="empty-stat"><div class="empty-stat-val" id="sess-wrong">0</div><div class="empty-stat-lbl">Sbagliati</div></div>
        <div class="empty-stat"><div class="empty-stat-val" id="sess-total">0</div><div class="empty-stat-lbl">Totali</div></div>
      </div>
      <a href="writing.html" style="margin-top:1rem;font-family:var(--font-mono);font-size:0.75rem;color:var(--vermillion);text-decoration:none">Ricomincia →</a>
    </div>

    <!-- INFO PANEL -->
    <div class="info-panel" id="infoPanel" style="display:none">
      <div class="info-cell">
        <div class="info-cell-label">Heisig Keyword</div>
        <div class="info-cell-value keyword" id="infoKeyword">—</div>
      </div>
      <div class="info-cell">
        <div class="info-cell-label">On-yomi</div>
        <div class="info-cell-value" id="infoOn">—</div>
      </div>
      <div class="info-cell">
        <div class="info-cell-label">Kun-yomi</div>
        <div class="info-cell-value" id="infoKun">—</div>
      </div>
      <div class="info-cell">
        <div class="info-cell-label">Significati</div>
        <div class="info-cell-value" id="infoMeanings" style="font-size:0.8rem;color:var(--paper2)">—</div>
      </div>
    </div>

    <!-- CANVAS ROW -->
    <div class="canvas-row" id="canvasRow" style="display:none">
      <div class="canvas-wrap" id="canvasWrap">
        <svg class="canvas-guide-diag" viewBox="0 0 1 1" preserveAspectRatio="none">
          <line x1="0" y1="0" x2="1" y2="1" stroke="rgba(255,255,255,0.04)" stroke-width="0.003"/>
          <line x1="1" y1="0" x2="0" y2="1" stroke="rgba(255,255,255,0.04)" stroke-width="0.003"/>
        </svg>
        <canvas id="drawCanvas"></canvas>
      </div>

      <div class="reveal-wrap" id="revealWrap" onclick="toggleReveal()">
        <div class="reveal-label">Mostra<br>kanji</div>
        <div class="reveal-eye" id="revealEye">👁</div>
        <div id="revealKanji">漢</div>
      </div>
    </div>

    <!-- STROKE CONTROLS -->
    <div class="stroke-controls" id="strokeControls" style="display:none">
      <button class="stroke-btn" onclick="undoStroke()">↩ Annulla</button>
      <button class="stroke-btn danger" onclick="clearCanvas()">✕ Cancella</button>
      <div class="stroke-size-wrap">
        ✏️
        <input type="range" id="brushSize" min="2" max="18" value="5" />
      </div>
      <div class="color-btns">
        <div class="color-dot active" style="background:#f5f0e8"  data-color="#f5f0e8"  onclick="setColor(this)"></div>
        <div class="color-dot"        style="background:#e74c3c"  data-color="#e74c3c"  onclick="setColor(this)"></div>
        <div class="color-dot"        style="background:#b8860b"  data-color="#b8860b"  onclick="setColor(this)"></div>
        <div class="color-dot"        style="background:#2980b9"  data-color="#2980b9"  onclick="setColor(this)"></div>
      </div>
    </div>

    <!-- ANSWER BUTTONS -->
    <div class="answer-area" id="answerArea">
      <button class="btn-wrong"    onclick="answer(false)">✗ &nbsp;Non riuscito</button>
      <button class="btn-correct"  onclick="answer(true)">✓ &nbsp;Corretto</button>
    </div>

  </main>

  <div class="toast" id="toast"></div>

  <script src="js/storage.js"></script>
  <script src="js/db.js"></script>
  <script>
    // ── CANVAS SETUP ───────────────────────────────────────
    const canvas  = document.getElementById('drawCanvas');
    const ctx     = canvas.getContext('2d');
    let drawing   = false;
    let lastX = 0, lastY = 0;
    let strokeColor = '#f5f0e8';
    let strokeSize  = 5;
    let strokes     = [];   // array of path arrays for undo
    let currentPath = [];

    function resizeCanvas() {
      const wrap = document.getElementById('canvasWrap');
      const rect  = wrap.getBoundingClientRect();
      const imgData = canvas.width > 0 ? ctx.getImageData(0, 0, canvas.width, canvas.height) : null;
      canvas.width  = rect.width;
      canvas.height = rect.height;
      ctx.lineCap   = 'round';
      ctx.lineJoin  = 'round';
      if (imgData) ctx.putImageData(imgData, 0, 0);
    }

    function getPos(e) {
      const r = canvas.getBoundingClientRect();
      if (e.touches) {
        return { x: e.touches[0].clientX - r.left, y: e.touches[0].clientY - r.top };
      }
      return { x: e.clientX - r.left, y: e.clientY - r.top };
    }

    function startDraw(e) {
      e.preventDefault();
      drawing = true;
      const p = getPos(e);
      lastX = p.x; lastY = p.y;
      currentPath = [{ x: lastX, y: lastY, color: strokeColor, size: strokeSize, start: true }];
      ctx.beginPath();
      ctx.arc(lastX, lastY, strokeSize / 2, 0, Math.PI * 2);
      ctx.fillStyle = strokeColor;
      ctx.fill();
    }

    function draw(e) {
      if (!drawing) return;
      e.preventDefault();
      const p = getPos(e);
      ctx.beginPath();
      ctx.moveTo(lastX, lastY);
      ctx.lineTo(p.x, p.y);
      ctx.strokeStyle = strokeColor;
      ctx.lineWidth   = strokeSize;
      ctx.lineCap     = 'round';
      ctx.lineJoin    = 'round';
      ctx.stroke();
      currentPath.push({ x: p.x, y: p.y });
      lastX = p.x; lastY = p.y;
    }

    function endDraw(e) {
      if (!drawing) return;
      drawing = false;
      if (currentPath.length > 0) strokes.push([...currentPath]);
      currentPath = [];
    }

    canvas.addEventListener('mousedown',  startDraw);
    canvas.addEventListener('mousemove',  draw);
    canvas.addEventListener('mouseup',    endDraw);
    canvas.addEventListener('mouseleave', endDraw);
    canvas.addEventListener('touchstart', startDraw, { passive: false });
    canvas.addEventListener('touchmove',  draw,      { passive: false });
    canvas.addEventListener('touchend',   endDraw);

    function clearCanvas() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      strokes = [];
    }

    function undoStroke() {
      strokes.pop();
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (const stroke of strokes) redrawStroke(stroke);
    }

    function redrawStroke(path) {
      if (!path.length) return;
      const first = path[0];
      ctx.beginPath();
      ctx.arc(first.x, first.y, (first.size || strokeSize) / 2, 0, Math.PI * 2);
      ctx.fillStyle = first.color || strokeColor;
      ctx.fill();
      for (let i = 1; i < path.length; i++) {
        const prev = path[i-1];
        const cur  = path[i];
        ctx.beginPath();
        ctx.moveTo(prev.x, prev.y);
        ctx.lineTo(cur.x, cur.y);
        ctx.strokeStyle = first.color || strokeColor;
        ctx.lineWidth   = first.size  || strokeSize;
        ctx.lineCap     = 'round'; ctx.lineJoin = 'round';
        ctx.stroke();
      }
    }

    function setColor(el) {
      strokeColor = el.dataset.color;
      document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
      el.classList.add('active');
    }

    document.getElementById('brushSize').addEventListener('input', e => {
      strokeSize = parseInt(e.target.value);
    });

    // ── STATE ──────────────────────────────────────────────
    let queue          = [];
    let currentIndex   = 0;
    let revealed       = false;
    let sessionCorrect = 0;
    let sessionWrong   = 0;
    let sessionTotal   = 0;

    // ── INIT ───────────────────────────────────────────────
    async function init() {
      await loadDB();

      // Se arrivo da kanji.html?k=... metto solo quel kanji in coda
      const params    = new URLSearchParams(location.search);
      const singleK   = params.get('k');

      let pool;
      if (singleK) {
        const k = findKanji(decodeURIComponent(singleK));
        pool = k ? [k] : [];
      } else {
        pool = getActiveKanji();
      }

      // Ordine casuale — indipendente da SRS
      queue = getWriteQueue(pool);

      document.getElementById('loadingState').style.display = 'none';

      if (!queue.length) { showEmpty(); return; }

      // Resize canvas once visible
      document.getElementById('canvasWrap').style.minHeight = '300px';
      showCard(0);
      setTimeout(resizeCanvas, 50);
      window.addEventListener('resize', resizeCanvas);
    }

    // ── SHOW CARD ──────────────────────────────────────────
    function showCard(idx) {
      if (idx >= queue.length) { showEmpty(); return; }

      const k = queue[idx];
      revealed = false;

      // Info panel
      document.getElementById('infoKeyword').textContent  = k.keyword  || '—';
      document.getElementById('infoOn').textContent       = k.on       || '—';
      document.getElementById('infoKun').textContent      = k.kun      || '—';
      document.getElementById('infoMeanings').textContent = k.meanings || '—';

      // Reveal
      document.getElementById('revealKanji').textContent = k.kanji;
      document.getElementById('revealKanji').classList.remove('visible');
      document.getElementById('revealEye').style.display = 'block';

      // Clear canvas
      clearCanvas();

      // Answer
      document.getElementById('answerArea').classList.remove('show');

      // Show panels
      document.getElementById('infoPanel').style.display      = 'grid';
      document.getElementById('canvasRow').style.display      = 'flex';
      document.getElementById('strokeControls').style.display = 'flex';

      document.getElementById('queueCount').textContent =
        `${idx + 1} / ${queue.length}`;
      updateProgress(idx);

      // Resize canvas dopo che il DOM è visibile
      requestAnimationFrame(() => { setTimeout(resizeCanvas, 30); });
    }

    // ── REVEAL ─────────────────────────────────────────────
    function toggleReveal() {
      const kEl = document.getElementById('revealKanji');
      const eye  = document.getElementById('revealEye');
      revealed = !revealed;
      kEl.classList.toggle('visible', revealed);
      eye.style.display = revealed ? 'none' : 'block';

      if (revealed) {
        // Mostra i bottoni di risposta
        document.getElementById('answerArea').classList.add('show');
      }
    }

    // ── ANSWER ─────────────────────────────────────────────
    function answer(correct) {
      const k = queue[currentIndex];
      updateWrite(k.kanji, correct);

      sessionTotal++;
      if (correct) sessionCorrect++; else sessionWrong++;

      if (!correct) {
        const reinsert = Math.min(currentIndex + 4, queue.length);
        queue.splice(reinsert, 0, { ...k });
      }

      showToast(
        correct
          ? `<span class="correct-col">✓ Corretto!</span>`
          : `<span class="wrong-col">✗ Riprova tra poco</span>`,
        1600
      );

      currentIndex++;
      showCard(currentIndex);
    }

    // ── PROGRESS ───────────────────────────────────────────
    function updateProgress(idx) {
      const pct = queue.length ? Math.round((idx / queue.length) * 100) : 0;
      document.getElementById('progressBar').style.width = pct + '%';
    }

    // ── EMPTY ──────────────────────────────────────────────
    function showEmpty() {
      document.getElementById('infoPanel').style.display      = 'none';
      document.getElementById('canvasRow').style.display      = 'none';
      document.getElementById('strokeControls').style.display = 'none';
      document.getElementById('answerArea').classList.remove('show');
      document.getElementById('emptyState').style.display     = 'flex';
      document.getElementById('progressBar').style.width      = '100%';
      document.getElementById('sess-correct').textContent = sessionCorrect;
      document.getElementById('sess-wrong').textContent   = sessionWrong;
      document.getElementById('sess-total').textContent   = sessionTotal;
    }

    // ── TOAST ──────────────────────────────────────────────
    function showToast(html, ms) {
      const t = document.getElementById('toast');
      t.innerHTML = html;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), ms || 1800);
    }

    // ── GO ─────────────────────────────────────────────────
    initSync();
    init();
  </script>
</body>
</html>
