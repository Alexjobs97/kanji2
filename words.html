<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Parole — KanjiBaby</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;800&family=Hina+Mincho&family=Klee+One&family=Zen+Kurenaido&family=DM+Mono:ital,wght@0,300;0,400;1,300&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --ink:#0f0e0d; --paper:#f5f0e8; --paper2:#d8d0c4;
      --vermillion:#c0392b; --gold:#b8860b;
      --muted:#9a9088; --border:#333028; --card-bg:#1c1915;
      --correct:#27ae60; --wrong:#c0392b;
      --font-jp:'Shippori Mincho',serif; --font-mono:'DM Mono',monospace; --font-sans:'Noto Sans JP',sans-serif;
    }
    :root[data-font="hina"]{--font-jp:'Hina Mincho',serif;}
    :root[data-font="klee"]{--font-jp:'Klee One',cursive;}
    :root[data-font="zen"] {--font-jp:'Zen Kurenaido',sans-serif;}
    :root[data-theme="light"]{--ink:#f0ebe0;--paper:#1a1714;--paper2:#3a3228;--border:#c8bfb0;--card-bg:#e8e0d4;--muted:#6a5f52;}
    body{background:var(--ink);color:var(--paper);font-family:var(--font-sans);font-weight:300;min-height:100vh;display:flex;flex-direction:column;}

    .topnav{display:flex;align-items:center;justify-content:space-between;padding:1.2rem 2rem;border-bottom:1px solid var(--border);flex-shrink:0;}
    .back-link{font-family:var(--font-mono);font-size:.7rem;color:var(--muted);text-decoration:none;letter-spacing:.1em;transition:color .2s;}
    .back-link:hover{color:var(--paper);}
    .topnav-title{font-family:var(--font-jp);font-size:1rem;font-weight:600;}
    .topnav-right{font-family:var(--font-mono);font-size:.65rem;color:var(--muted);text-align:right;}

    main{flex:1;display:flex;flex-direction:column;align-items:center;padding:1.5rem;gap:1.2rem;overflow-y:auto;}

    /* ── SETUP SCREEN ── */
    .setup-card{width:100%;max-width:480px;background:var(--card-bg);border:1px solid var(--border);border-radius:12px;padding:2rem;display:flex;flex-direction:column;gap:1.5rem;}
    .setup-title{font-family:var(--font-jp);font-size:1.6rem;font-weight:600;color:var(--paper);}
    .setup-desc{font-family:var(--font-mono);font-size:.72rem;color:var(--muted);line-height:1.6;}
    .setup-section{display:flex;flex-direction:column;gap:.6rem;}
    .setup-label{font-family:var(--font-mono);font-size:.58rem;color:var(--muted);letter-spacing:.2em;text-transform:uppercase;}
    .mode-btns,.diff-btns{display:flex;gap:.5rem;flex-wrap:wrap;}
    .mode-btn,.diff-btn{font-family:var(--font-mono);font-size:.72rem;padding:.5rem 1rem;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .2s;}
    .mode-btn:hover,.diff-btn:hover{color:var(--paper);border-color:var(--muted);}
    .mode-btn.active{color:var(--paper);border-color:var(--vermillion);background:rgba(192,57,43,.1);}
    .diff-btn.active{color:var(--paper);border-color:var(--gold);background:rgba(184,134,11,.1);}
    .start-btn{width:100%;padding:.9rem;background:var(--vermillion);border:none;border-radius:8px;color:#fff;font-family:var(--font-mono);font-size:.9rem;letter-spacing:.1em;cursor:pointer;transition:opacity .2s;}
    .start-btn:hover{opacity:.85;}
    .record-row{display:flex;gap:2rem;padding-top:.5rem;border-top:1px solid var(--border);}
    .rec-item{display:flex;flex-direction:column;gap:.1rem;}
    .rec-val{font-family:var(--font-jp);font-size:1.4rem;font-weight:600;}
    .rec-lbl{font-family:var(--font-mono);font-size:.55rem;color:var(--muted);letter-spacing:.15em;text-transform:uppercase;}

    /* ── GAME HUD ── */
    .game-hud{width:100%;max-width:540px;display:flex;align-items:center;justify-content:space-between;padding:.6rem 1rem;background:var(--card-bg);border:1px solid var(--border);border-radius:8px;font-family:var(--font-mono);font-size:.75rem;}
    .hud-score span{color:var(--gold);font-size:1.1rem;font-weight:600;}
    .hud-lives{display:flex;gap:.3rem;}
    .life{font-size:1rem;transition:opacity .3s;}
    .life.lost{opacity:.2;}
    .hud-end-btn{background:none;border:1px solid var(--border);border-radius:4px;padding:.3rem .7rem;color:var(--muted);font-family:var(--font-mono);font-size:.65rem;cursor:pointer;transition:all .2s;}
    .hud-end-btn:hover{color:var(--paper);border-color:var(--muted);}

    /* ── WORD DISPLAY (highscore) ── */
    .word-display{width:100%;max-width:540px;background:var(--card-bg);border:1px solid var(--border);border-radius:12px;padding:1.8rem 2rem;display:flex;flex-direction:column;align-items:center;gap:1rem;}
    .wd-word{font-family:var(--font-jp);font-size:clamp(2.5rem,10vw,4rem);font-weight:800;color:var(--paper);}
    .wd-meaning{font-family:var(--font-sans);font-size:.8rem;color:var(--muted);text-align:center;}
    .wd-reveal{font-family:var(--font-jp);font-size:1.1rem;color:var(--gold);margin-top:.2rem;}

    /* ── KANJI DISPLAY (qns) ── */
    .kanji-display{width:100%;max-width:540px;background:var(--card-bg);border:1px solid var(--border);border-radius:12px;padding:1.5rem 2rem;display:flex;align-items:center;gap:2rem;}
    .kd-kanji{font-family:var(--font-jp);font-size:clamp(4rem,12vw,6rem);font-weight:800;color:var(--paper);line-height:1;flex-shrink:0;}
    .kd-info{flex:1;}
    .kd-keyword{font-family:var(--font-jp);font-size:1.1rem;font-weight:600;color:var(--vermillion);margin-bottom:.3rem;}
    .kd-count{font-family:var(--font-mono);font-size:.65rem;color:var(--muted);}

    /* ── INPUT ── */
    .input-area{width:100%;max-width:540px;display:flex;gap:.6rem;}
    #answerInput{flex:1;padding:.75rem 1rem;background:var(--card-bg);border:1px solid var(--border);border-radius:8px;color:var(--paper);font-family:var(--font-jp);font-size:1.1rem;outline:none;transition:border-color .2s,box-shadow .2s;}
    #answerInput:focus{border-color:var(--vermillion);box-shadow:0 0 0 3px rgba(192,57,43,.12);}
    #answerInput.correct-flash{border-color:var(--correct);box-shadow:0 0 0 3px rgba(39,174,96,.2);}
    #answerInput.wrong-flash{border-color:var(--wrong);box-shadow:0 0 0 3px rgba(192,57,43,.2);}
    .submit-btn{padding:.75rem 1.2rem;background:var(--vermillion);border:none;border-radius:8px;color:#fff;font-family:var(--font-mono);font-size:.8rem;cursor:pointer;transition:opacity .2s;flex-shrink:0;}
    .submit-btn:hover{opacity:.85;}

    /* ── ACTION BUTTONS ── */
    .action-row{width:100%;max-width:540px;display:flex;gap:.6rem;}
    .act-btn{flex:1;padding:.7rem;border-radius:7px;border:1px solid var(--border);background:var(--card-bg);color:var(--muted);font-family:var(--font-mono);font-size:.75rem;cursor:pointer;transition:all .2s;text-align:center;}
    .act-btn:hover{color:var(--paper);border-color:var(--muted);}
    .act-btn.next{background:rgba(39,174,96,.12);border-color:var(--correct);color:var(--correct);}

    /* ── FEEDBACK ── */
    .feedback{width:100%;max-width:540px;background:var(--card-bg);border:1px solid var(--border);border-radius:8px;padding:.9rem 1.1rem;font-family:var(--font-jp);font-size:.95rem;display:none;}
    .feedback.show{display:flex;flex-direction:column;gap:.3rem;}
    .fb-reading{font-size:.85rem;color:var(--vermillion);}
    .fb-meaning{font-size:.75rem;color:var(--muted);font-family:var(--font-sans);}

    /* ── FOUND WORDS (qns) ── */
    .found-wrap{width:100%;max-width:540px;}
    .found-label{font-family:var(--font-mono);font-size:.58rem;color:var(--muted);letter-spacing:.2em;text-transform:uppercase;margin-bottom:.5rem;}
    .found-chips{display:flex;flex-wrap:wrap;gap:.4rem;}
    .found-chip{font-family:var(--font-jp);font-size:.88rem;background:rgba(39,174,96,.1);border:1px solid rgba(39,174,96,.3);border-radius:4px;padding:.2rem .55rem;color:var(--correct);text-decoration:none;transition:background .2s;}
    .found-chip:hover{background:rgba(39,174,96,.2);}

    /* ── GAME OVER ── */
    .gameover-card{width:100%;max-width:480px;background:var(--card-bg);border:1px solid var(--border);border-radius:12px;padding:2rem;display:none;flex-direction:column;align-items:center;gap:1.2rem;text-align:center;}
    .gameover-card.show{display:flex;}
    .go-title{font-family:var(--font-jp);font-size:1.8rem;font-weight:600;}
    .go-score{font-family:var(--font-jp);font-size:3.5rem;font-weight:800;color:var(--gold);}
    .go-record{font-family:var(--font-mono);font-size:.7rem;color:var(--muted);}
    .go-new-record{font-family:var(--font-mono);font-size:.75rem;color:var(--gold);border:1px solid var(--gold);border-radius:4px;padding:.3rem .8rem;display:none;}
    .go-btns{display:flex;gap:.8rem;margin-top:.5rem;}
    .go-btn{font-family:var(--font-mono);font-size:.78rem;padding:.65rem 1.3rem;border-radius:6px;border:1px solid var(--border);background:var(--card-bg);color:var(--paper);cursor:pointer;transition:all .2s;}
    .go-btn:hover{border-color:var(--muted);}
    .go-btn.primary{background:var(--vermillion);border-color:var(--vermillion);}
    .go-btn.primary:hover{background:#a93226;}

    /* ── LOADING ── */
    #loadingState{display:flex;flex-direction:column;align-items:center;gap:1rem;color:var(--muted);font-family:var(--font-mono);font-size:.75rem;letter-spacing:.15em;padding:4rem 0;}
    .loader{width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--vermillion);border-radius:50%;animation:spin .8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}

    .toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(4rem);background:var(--card-bg);border:1px solid var(--border);border-radius:8px;padding:.7rem 1.4rem;font-family:var(--font-mono);font-size:.75rem;color:var(--paper);opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;z-index:50;white-space:nowrap;}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  </style>
</head>
<body>
<nav class="topnav">
  <a href="index.html" class="back-link">← home</a>
  <div class="topnav-title">語 · Parole</div>
  <div class="topnav-right" id="topRight"></div>
</nav>

<main id="mainArea">
  <div id="loadingState"><div class="loader"></div>CARICAMENTO…</div>
</main>

<div class="toast" id="toast"></div>

<script src="js/storage.js"></script>
<script src="js/db.js"></script>
<script>
initSync();

// ── STATE ─────────────────────────────────────────────────────
let MODE='hs', LIVES=5;
let allWords=[], allKanjiDB=[];

// Highscore state
let hs_queue=[], hs_idx=0, hs_score=0, hs_lives=LIVES, hs_revealed=false;

// QNS state
let qns_queue=[], qns_idx=0, qns_score=0, qns_lives=LIVES;
let qns_found=[];  // parole trovate per kanji corrente
let qns_foundAll=[]; // tutte le parole trovate in sessione
let qns_needAtLeast1=false; // ha trovato almeno 1 per questo kanji

// ── INIT ──────────────────────────────────────────────────────
async function init() {
  await loadDB();
  allWords    = getAllWords();
  allKanjiDB  = getActiveKanji();
  document.getElementById('loadingState').style.display='none';
  showSetup();
}

// ── SETUP SCREEN ──────────────────────────────────────────────
function showSetup() {
  const hsRec  = getHSRecord();
  const qnsRec = getQNSRecord();
  document.getElementById('mainArea').innerHTML=`
    <div class="setup-card">
      <div class="setup-title">語 · Pratica parole</div>
      <div class="setup-section">
        <div class="setup-label">Modalità</div>
        <div class="mode-btns">
          <button class="mode-btn ${MODE==='hs'?'active':''}"  onclick="setMode('hs',this)">🏆 Highscore</button>
          <button class="mode-btn ${MODE==='qns'?'active':''}" onclick="setMode('qns',this)">🔍 Quante ne sai?</button>
        </div>
      </div>
      <div id="modeDesc" style="font-family:var(--font-mono);font-size:.7rem;color:var(--muted);line-height:1.6">${getModeDesc()}</div>
      <div class="setup-section">
        <div class="setup-label">Vite</div>
        <div class="diff-btns">
          <button class="diff-btn ${LIVES===1?'active':''}"  onclick="setLives(1,this)">1 vita</button>
          <button class="diff-btn ${LIVES===5?'active':''}"  onclick="setLives(5,this)">5 vite</button>
          <button class="diff-btn ${LIVES===10?'active':''}" onclick="setLives(10,this)">10 vite</button>
        </div>
      </div>
      <button class="start-btn" onclick="startGame()">Inizia →</button>
      <div class="record-row">
        <div class="rec-item"><div class="rec-val" style="color:var(--gold)">${hsRec}</div><div class="rec-lbl">Record Highscore</div></div>
        <div class="rec-item"><div class="rec-val" style="color:var(--correct)">${qnsRec}</div><div class="rec-lbl">Record Quante ne sai</div></div>
      </div>
    </div>`;
}

function getModeDesc(){
  return MODE==='hs'
    ? 'Vedi una parola — scrivi la sua lettura in kana. Ogni risposta corretta = 1 punto. Se sbagli perdi una vita e puoi riprovare o passare.'
    : 'Vedi un kanji — scrivi più parole possibili che lo contengono. Validazione in tempo reale via kanjiapi.dev. Almeno 1 parola per kanji per poter passare.';
}
function setMode(m, el) {
  MODE=m;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('modeDesc').textContent=getModeDesc();
}
function setLives(n, el) {
  LIVES=n;
  document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
}

function startGame() { MODE==='hs' ? startHS() : startQNS(); }

// ════════════════════════════════════════════════════════════
//  HIGHSCORE MODE
// ════════════════════════════════════════════════════════════
function startHS() {
  hs_queue   = shuffleArray([...allWords]);
  hs_idx     = 0; hs_score = 0; hs_lives = LIVES; hs_revealed=false;
  renderHS();
}

function renderHS() {
  if (hs_idx >= hs_queue.length || hs_lives <= 0) { gameOverHS(); return; }
  hs_revealed = false;
  const w = hs_queue[hs_idx];
  const livesHTML = Array.from({length:LIVES},(_,i)=>`<span class="life${i>=hs_lives?' lost':''}">❤️</span>`).join('');
  document.getElementById('mainArea').innerHTML=`
    <div class="game-hud">
      <div class="hud-score">Punti: <span>${hs_score}</span></div>
      <div class="hud-lives">${livesHTML}</div>
      <button class="hud-end-btn" onclick="gameOverHS()">Fine</button>
    </div>
    <div class="word-display">
      <div class="wd-word">${w.word}</div>
      <div class="wd-meaning">${w.meaning}</div>
      <div class="wd-reveal" id="wd-reveal" style="display:none">${w.reading}</div>
    </div>
    <div class="input-area">
      <input type="text" id="answerInput" placeholder="Scrivi la lettura in kana…" autocomplete="off" spellcheck="false" autofocus
        onkeydown="if(event.key==='Enter')checkHS()"/>
      <button class="submit-btn" onclick="checkHS()">→</button>
    </div>
    <div class="feedback" id="fb"></div>
    <div class="action-row" id="actionRow" style="display:none">
      <button class="act-btn" onclick="skipHS()">Passa →</button>
    </div>`;
  setTimeout(()=>{ const inp=document.getElementById('answerInput'); if(inp) inp.focus(); },50);
}

function checkHS() {
  const inp = document.getElementById('answerInput'); if(!inp) return;
  const ans = inp.value.trim();
  if (!ans) return;
  const w   = hs_queue[hs_idx];
  // Normalizza: rimuovi spazi, confronta con tutte le letture possibili
  const correct = normalizeKana(ans) === normalizeKana(w.reading);
  if (correct) {
    hs_score++;
    inp.classList.add('correct-flash');
    document.getElementById('wd-reveal').style.display='block';
    showFeedback(true, w.reading, w.meaning);
    setTimeout(()=>{ inp.classList.remove('correct-flash'); hs_idx++; renderHS(); }, 1200);
  } else {
    hs_lives--;
    inp.classList.add('wrong-flash');
    inp.value='';
    setTimeout(()=>inp.classList.remove('wrong-flash'),500);
    document.getElementById('wd-reveal').style.display='block';
    showFeedback(false, w.reading, w.meaning);
    document.getElementById('actionRow').style.display='flex';
    if (hs_lives <= 0) { setTimeout(gameOverHS, 1200); }
  }
}

function skipHS() {
  hs_idx++; renderHS();
}

function showFeedback(correct, reading, meaning) {
  const fb=document.getElementById('fb'); if(!fb) return;
  fb.innerHTML=`<div style="color:${correct?'var(--correct)':'var(--wrong)'}">${correct?'✓ Corretto!':'✗ Sbagliato'}</div>
    <div class="fb-reading">${reading}</div>
    <div class="fb-meaning">${meaning}</div>`;
  fb.classList.add('show');
}

function gameOverHS() {
  setHSRecord(hs_score);
  const rec = getHSRecord();
  const isNew = hs_score >= rec && hs_score > 0;
  document.getElementById('mainArea').innerHTML=`
    <div class="gameover-card show">
      <div class="go-title">🏆 Fine partita</div>
      <div class="go-score">${hs_score}</div>
      <div class="go-record">Record: ${rec}</div>
      <div class="go-new-record" style="${isNew?'display:block':''}">★ Nuovo record!</div>
      <div class="go-btns">
        <button class="go-btn primary" onclick="startHS()">Rigioca</button>
        <button class="go-btn" onclick="showSetup()">Menu</button>
      </div>
    </div>`;
}

// ════════════════════════════════════════════════════════════
//  QUANTE NE SAI MODE
// ════════════════════════════════════════════════════════════
function startQNS() {
  qns_queue   = shuffleArray([...allKanjiDB]);
  qns_idx     = 0; qns_score = 0; qns_lives = LIVES;
  qns_found   = []; qns_foundAll = []; qns_needAtLeast1 = false;
  renderQNS();
}

function renderQNS() {
  if (qns_idx >= qns_queue.length || qns_lives <= 0) { gameOverQNS(); return; }
  qns_found = []; qns_needAtLeast1 = false;
  const k = qns_queue[qns_idx];
  const livesHTML = Array.from({length:LIVES},(_,i)=>`<span class="life${i>=qns_lives?' lost':''}">❤️</span>`).join('');
  document.getElementById('mainArea').innerHTML=`
    <div class="game-hud">
      <div class="hud-score">Punti: <span id="scoreDisp">${qns_score}</span></div>
      <div class="hud-lives" id="livesDisp">${livesHTML}</div>
      <button class="hud-end-btn" onclick="gameOverQNS()">Fine</button>
    </div>
    <div class="kanji-display">
      <div class="kd-kanji">${k.kanji}</div>
      <div class="kd-info">
        <div class="kd-keyword">${k.keyword}</div>
        <div class="kd-count" id="foundCount">0 parole trovate</div>
      </div>
    </div>
    <div class="input-area">
      <input type="text" id="answerInput" placeholder="Scrivi una parola con ${k.kanji}…" autocomplete="off" spellcheck="false" autofocus
        onkeydown="if(event.key==='Enter')checkQNS()"/>
      <button class="submit-btn" onclick="checkQNS()">→</button>
    </div>
    <div class="feedback" id="fb"></div>
    <div class="action-row" id="actionRow">
      <button class="act-btn${qns_needAtLeast1?' next':''}" id="nextBtn" onclick="nextQNS()">
        ${qns_needAtLeast1?'Prossimo kanji →':'Trova almeno 1 parola prima'}
      </button>
    </div>
    <div class="found-wrap">
      <div class="found-label">Parole trovate questa sessione</div>
      <div class="found-chips" id="foundChips">${renderFoundChips()}</div>
    </div>`;
  setTimeout(()=>{ const inp=document.getElementById('answerInput'); if(inp) inp.focus(); },50);
}

async function checkQNS() {
  const inp=document.getElementById('answerInput'); if(!inp) return;
  const word=inp.value.trim(); if(!word) return;
  inp.value='';

  const k=qns_queue[qns_idx];

  // Controlla: parola già trovata?
  if (qns_found.includes(word)||qns_foundAll.find(x=>x.word===word&&x.kanji===k.kanji)) {
    showToast('Parola già trovata!', 1500); return;
  }

  // Controlla: contiene il kanji?
  if (!word.includes(k.kanji)) {
    inp.classList.add('wrong-flash');
    setTimeout(()=>inp.classList.remove('wrong-flash'),500);
    showToast(`La parola non contiene ${k.kanji}`, 1500);
    return;
  }

  // Valida via kanjiapi.dev
  const valid = await validateWordKanjiAPI(k.kanji, word);
  if (valid.ok) {
    qns_found.push(word);
    qns_foundAll.push({ word, kanji: k.kanji, reading: valid.reading||'', meaning: valid.meaning||'' });
    qns_score++;
    qns_needAtLeast1=true;
    inp.classList.add('correct-flash');
    setTimeout(()=>inp.classList.remove('correct-flash'),400);

    // Aggiorna UI
    const fc=document.getElementById('foundCount'); if(fc) fc.textContent=qns_found.length+' parole trovate';
    const sc=document.getElementById('scoreDisp'); if(sc) sc.textContent=qns_score;
    const chips=document.getElementById('foundChips'); if(chips) chips.innerHTML=renderFoundChips();
    // Aggiorna bottone next
    const nb=document.getElementById('nextBtn');
    if(nb){ nb.textContent='Prossimo kanji →'; nb.className='act-btn next'; }
    showFeedback(true, valid.reading, valid.meaning||'');
  } else {
    qns_lives--;
    inp.classList.add('wrong-flash');
    setTimeout(()=>inp.classList.remove('wrong-flash'),500);
    showFeedback(false, '', 'Parola non trovata nel dizionario');
    // Aggiorna vite
    const ld=document.getElementById('livesDisp');
    if(ld) ld.innerHTML=Array.from({length:LIVES},(_,i)=>`<span class="life${i>=qns_lives?' lost':''}">❤️</span>`).join('');
    if(qns_lives<=0) setTimeout(gameOverQNS,1000);
  }
}

async function validateWordKanjiAPI(kanji, word) {
  try {
    const res  = await fetch(`https://kanjiapi.dev/v1/words/${encodeURIComponent(kanji)}`);
    if (!res.ok) throw new Error('HTTP '+res.status);
    const data = await res.json();
    for (const entry of data) {
      for (const v of (entry.variants||[])) {
        if (v.written === word) {
          const reading = v.pronounced||'';
          const meaning = (entry.meanings||[]).map(m=>(m.glosses||[]).join(', ')).join(' / ').slice(0,80);
          return { ok:true, reading, meaning };
        }
      }
    }
    return { ok:false };
  } catch(e) {
    // Se kanjiapi fallisce, accetta se la parola contiene il kanji (fallback permissivo)
    console.warn('kanjiapi fallito:', e.message);
    return { ok:true, reading:'', meaning:'' };
  }
}

function nextQNS() {
  if (!qns_needAtLeast1) { showToast('Trova almeno 1 parola prima di passare!', 1800); return; }
  qns_idx++; renderQNS();
}

function renderFoundChips() {
  return qns_foundAll.map(w=>
    `<a class="found-chip" href="https://jisho.org/search/${encodeURIComponent(w.word)}" target="_blank" rel="noopener">${w.word}</a>`
  ).join('');
}

function gameOverQNS() {
  setQNSRecord(qns_score);
  const rec=getQNSRecord();
  const isNew=qns_score>=rec&&qns_score>0;
  const allChips=qns_foundAll.map(w=>
    `<a class="found-chip" href="https://jisho.org/search/${encodeURIComponent(w.word)}" target="_blank" rel="noopener">${w.word}</a>`
  ).join('');
  document.getElementById('mainArea').innerHTML=`
    <div class="gameover-card show">
      <div class="go-title">📚 Fine sessione</div>
      <div class="go-score">${qns_score}</div>
      <div class="go-record">Record: ${rec}</div>
      <div class="go-new-record" style="${isNew?'display:block':''}">★ Nuovo record!</div>
      ${qns_foundAll.length?`<div style="width:100%;text-align:left"><div style="font-family:var(--font-mono);font-size:.58rem;color:var(--muted);letter-spacing:.2em;text-transform:uppercase;margin-bottom:.5rem">Parole trovate</div><div class="found-chips" style="max-height:150px;overflow-y:auto">${allChips}</div></div>`:''}
      <div class="go-btns">
        <button class="go-btn primary" onclick="startQNS()">Rigioca</button>
        <button class="go-btn" onclick="showSetup()">Menu</button>
      </div>
    </div>`;
}

// ── UTILS ─────────────────────────────────────────────────────
function normalizeKana(s) {
  // Converte katakana → hiragana per confronto flessibile
  return s.trim().replace(/[\u30A1-\u30F6]/g, c => String.fromCharCode(c.charCodeAt(0)-0x60));
}

function showFeedback(correct, reading, meaning) {
  const fb=document.getElementById('fb'); if(!fb) return;
  fb.innerHTML=`<div style="color:${correct?'var(--correct)':'var(--wrong)'}">${correct?'✓ Corretto!':'✗ Non trovato'}</div>
    ${reading?`<div class="fb-reading">${reading}</div>`:''}
    ${meaning?`<div class="fb-meaning">${meaning}</div>`:''}`;
  fb.classList.add('show');
  if(correct) setTimeout(()=>fb.classList.remove('show'),1500);
}

function showToast(msg, ms) {
  const t=document.getElementById('toast'); t.textContent=msg;
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),ms||1800);
}

function shuffleArray(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
